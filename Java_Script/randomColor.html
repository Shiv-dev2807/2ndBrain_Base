<!--

2. Random Color Generator

Features:

Button generates random background color
Show HEX code
Copy button

You'll learn:

Math.random()
strings
clipboard
style manipulation

-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Generator</title>
    <style>
        body{
            background-color: #000000;
        }
        button{
            font-size: 100px;
        }
        h1{
            color: white;
        }
    </style>
</head>
<body class="bgc">
    <h1 class="code">#000000</h1>
    <button class="change-color">
        Change Color
    </button>
    <button class="copy">
        copy
    </button>
</body>

<script>
    const hex = '0123456789ABCDEF';
    let body = document.querySelector(".bgc")
    let h1 = document.querySelector(".code")
    document.querySelector(".change-color").addEventListener("click",function(){
        let color = '#';
        for (let index = 0; index < 6; index++) {
            let ran = Math.floor(Math.random() * hex.length);
            color = color + hex[ran]
        }
        h1.textContent = color
        body.style.backgroundColor = color
    
    })
    document.querySelector(".copy").addEventListener("click",function(){
        navigator.clipboard.writeText(h1.textContent)    
    })
</script>

</html>
