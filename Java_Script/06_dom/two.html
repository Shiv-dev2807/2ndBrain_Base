<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: black; color: white;">
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thrusday</div>
    </div>
</body>
<script>
    const par = document.querySelector(".parent")
    console.log(par);
    console.log(par.children);
    console.log(par.children[1].innerHTML);
    for (let index = 0; index < par.children.length; index++) {
        console.log(par.children[index].innerHTML);
    }
    console.log(par.firstElementChild);
    console.log(par.lastElementChild);

    const dO = document.querySelector('.day')
    console.log(dO);
    console.log(dO.parentElement);
    console.log(dO.nextElementSibling);
    
    console.log("nodes: ",par.childNodes);
</script>
</html>
