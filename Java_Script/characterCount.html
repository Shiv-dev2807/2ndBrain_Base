<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Count</title>
    <style>
        body{
            background-color: black;
        }
        textarea{
            height: 300px;
            width: 600px;
        }
    </style>
</head>
<body>
    <textarea name="char" id="char" class="char-input"></textarea>
    <button class="charSubmit">Submit</button>
    <h2 class="charname"></h2>
</body>
<script>
    let char = document.querySelector(".char-input")
    
    
     
    document.querySelector(".charSubmit").addEventListener("click",function(){
        let l = (char.value).trim();
        let words = l === "" ? 0 : l.split(/\s+/).length;
        console.log(char.value.length)
        console.log(words);

    })

    
</script>
</html>
