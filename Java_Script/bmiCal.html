<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI</title>
    <style>
        h1{
            font-size: 100px;
        }
        div{
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>BMI Calculator</h1>
    <div class="input">
        <!--!HEIGHT -->
        <div class="height">
            <label for="height">Height</label>
            <input type="text" id="height-input" class="height-input">

            <label for="heightin">Select</label>
            <select name="heightin" id="heightin" class="heightin">
                <option value="Cm">Cm</option>
                <option value="M">M</option>
            </select>
        </div>

        <!--!WEIGHT-->
        <div class="weight">
            <label for="weight">Weight</label>
            <input type="text" id="weight-input" class="weight-input">

            <label for="weightin">Select</label>
            <select name="weightin" id="weightin" class="weightin">
                <option value="Kg">Kg</option>
                <option value="Lb">Lb</option>
            </select>
        </div>

        <!--!SUBMIT-->
        <input type="submit" value="Submit" class="submit">

        <!--!CATEGORY-->
        <h2 class="Bmi-cat">BMI Categories</h2>
        <ul>
            <li class="underweight">Below 18.5 → Underweight</li>
            <li class="normalweight">18.5 – 24.9 → Normal weight</li>
            <li class="overweight">25.0 – 29.9 → Overweight</li>
            <li class="obese">30.0 and above → Obese</li>
        </ul>
    </div>

    <h2>Your Category: <span class="display"></span> <span class="cat"></span></h2>
</body>
<script>
    submit = document.querySelector(".submit")
    display = document.querySelector(".display")
    cat = document.querySelector(".cat")

    submit.addEventListener("click",function(){
        height = document.querySelector(".height-input")
        weight = document.querySelector(".weight-input")
        
        heightUnit = document.querySelector(".heightin")
        weightUnit = document.querySelector(".weightin")

        //================================================//

        if(Number(weight.value)>0 && Number(height.value)>0){
            w = Number(weight.value)
            h = Number(height.value)

            // formula Weight(kg)/(Height(m))^2
            if(weightUnit.value === "Lb"){
                w = w * 0.45359237
            }
            else if(heightUnit.value === "Cm"){
                h = Number(height.value)/100
            }

            bmi = (w/h**2)
            display.textContent=bmi.toFixed(2)

            // Category
            if(bmi >= 30.0){
                cat.textContent  = "Obese"
            }
            else if(bmi >= 25.0){
                cat.textContent = "Overweight"
            }
            else if(bmi >= 18.5){
                cat.textContent = "Normal weight"
            }
            else{
                cat.textContent ="Underweight"
            }
        }
        else if(Number(height.value)<0 || Number(weight.value)<0){
            display.textContent = "one of the input is"
            cat.textContent = "invalid"
        }
        else{
            display.textContent = "empty"
            cat.textContent = "input"
        }
        
    })
    
    
</script>
</html>
